name: Generate Marketplace

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate marketplace
        run: node scripts/generate-marketplace.mjs

      - name: Commit marketplace output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marketplace/
          if git diff --cached --quiet; then
            echo "No changes to marketplace output."
          else
            git commit -m "chore: regenerate marketplace [skip ci]"
            git push
          fi
