name: Validate Marketplace Images

on:
  pull_request:
    paths:
      - 'powers/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate marketplace images for changed scripts
        run: |
          changed=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...HEAD)
          scripts=$(echo "$changed" | grep -E '^powers/.*/script\.(js|py)$' || true)
          if [ -z "$scripts" ]; then
            echo "No script files changed."
            exit 0
          fi
          bash scripts/validate-marketplace-images.sh $scripts
